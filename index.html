<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="mhp - my home page" />
    <meta name="theme-color" content="#000000" />

    <!-- open graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="mhp" />
    <meta property="og:description" content="mhp." />

    <script>
      (() => {
        const root = document.documentElement;
        const isValidTheme = value => value === 'light' || value === 'dark';
        const isValidAlignment = value =>
          value === 'start' || value === 'center' || value === 'end';
        let theme = 'dark';
        let alignment = 'start';

        try {
          const storedTheme = localStorage.getItem('theme');
          if (isValidTheme(storedTheme)) theme = storedTheme;

          const storedAlignment = localStorage.getItem('alignment');
          if (isValidAlignment(storedAlignment)) {
            alignment = storedAlignment;
          }
        } catch {}

        if (theme === 'dark') root.classList.add('dark');
        root.dataset.alignment = alignment;
      })();
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- <link rel="icon" type="image/svg+xml" href="/favicon.svg" /> -->
    <title>mhp</title>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
